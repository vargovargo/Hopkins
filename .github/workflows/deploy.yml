name: Build check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Mapbox token is required at build time for Vite to embed in bundle.
          # Add VITE_MAPBOX_TOKEN as a repository secret in GitHub Settings →
          # Secrets and variables → Actions → New repository secret.
          # Without it the map shows a no-token fallback; the build still succeeds.
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Report build output
        run: |
          echo "Build output:"
          du -sh dist/
          find dist -type f | sort
